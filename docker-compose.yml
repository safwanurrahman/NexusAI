
services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .              # Key: Look at the ROOT project folder
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    environment:
      - PYTHONPATH=/app      # Key: Make /app (root) the source for imports
    ports:
      - "8000:8000"
    volumes:
      - .:/app               # Sync everything to /app
    depends_on:
      - redis
    # We run the command from the root /app so it can "see" the backend folder
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: ./backend/.env
    environment:
      - PYTHONPATH=/app
    volumes:
      - .:/app
    depends_on:
      - redis
    command: celery -A backend.worker worker --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:8000
    command: npm run dev -- --host 0.0.0.0 --port 8080
